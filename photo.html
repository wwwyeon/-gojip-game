<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>고집돌우럭 네컷</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fffef8;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.wrap{width:100%;max-width:420px;padding:16px;min-height:100vh;}
.screen{display:none;}
.screen.active{display:block;}

/* 입장 화면 */
.intro-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0;}
.intro-title-box{border:3px solid #1a1a1a;border-radius:6px;padding:10px 28px;margin-bottom:24px;background:#fff;}
.intro-title{font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:0.04em;font-family:Georgia,serif;}

.booth-svg{width:100%;max-width:300px;}

.enter-btn{margin-top:20px;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:2.5px solid #1a1a1a;border-radius:8px;padding:14px 36px;font-size:16px;font-weight:700;color:#1a1a1a;cursor:pointer;font-family:Georgia,serif;letter-spacing:0.02em;}
.enter-btn:active{background:#f5f5f5;}
.made-by{font-size:11px;color:#aaa;margin-top:16px;text-align:center;}

/* 촬영 화면 */
.header{text-align:center;padding:16px 0 10px;}
.badge{display:inline-block;background:#1a3a5c;color:#fff;font-size:11px;padding:4px 12px;border-radius:20px;margin-bottom:8px;}
.title{font-size:20px;font-weight:700;color:#1a1a1a;line-height:1.3;}
.sub{font-size:12px;color:#888;margin-top:4px;}
.progress-dots{display:flex;justify-content:center;gap:8px;margin:10px 0 4px;}
.dot{width:10px;height:10px;border-radius:50%;background:#e0dcd4;transition:background 0.2s;}
.dot.on{background:#1a3a5c;}
.count-label{text-align:center;font-size:13px;color:#888;margin-bottom:8px;}
.cam-wrap{position:relative;border-radius:16px;overflow:hidden;background:#111;margin:6px 0;}
#preview{width:100%;display:block;aspect-ratio:3/4;object-fit:cover;}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity 0.05s;}
.flash.on{opacity:0.9;}
.countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);}
.countdown.on{display:flex;}
.countdown-num{font-size:80px;font-weight:700;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.4);}
.no-cam{position:absolute;inset:0;background:#222;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.no-cam.show{display:flex;}
.no-cam-txt{color:rgba(255,255,255,0.7);font-size:13px;text-align:center;line-height:1.6;padding:0 20px;}
.shutter-row{display:flex;justify-content:center;padding:10px 0 6px;}
.shutter{width:64px;height:64px;border-radius:50%;background:#fff;border:5px solid rgba(0,0,0,0.1);box-shadow:0 2px 8px rgba(0,0,0,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.shutter:active{transform:scale(0.93);}
.shutter-in{width:50px;height:50px;border-radius:50%;background:#fff;border:2px solid #ddd;}
.shutter.disabled{opacity:0.4;pointer-events:none;}

/* 결과 2x2 그리드 */
.result-outer{display:flex;justify-content:center;margin:10px 0;}
.film{background:#fff;border-radius:14px;padding:12px 12px 10px;box-shadow:0 2px 20px rgba(0,0,0,0.10);position:relative;width:280px;overflow:visible;}
.film-photos{display:grid;grid-template-columns:1fr 1fr;gap:5px;position:relative;z-index:1;}
.film-slot{aspect-ratio:3/4;background:#f0ede8;border-radius:6px;overflow:hidden;position:relative;}
.film-slot img.photo{width:100%;height:100%;object-fit:cover;display:block;}
.deco-img{position:absolute;pointer-events:none;z-index:10;}
.film-footer{text-align:center;margin-top:8px;padding-top:6px;border-top:1px solid #f0ede8;position:relative;z-index:1;}
.film-logo{font-size:11px;font-weight:700;color:#1a3a5c;letter-spacing:0.08em;}
.film-date{font-size:10px;color:#bbb;margin-top:2px;}

.btn-main{width:100%;padding:15px;background:#1a3a5c;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;-webkit-appearance:none;}
.btn-main:active{opacity:0.85;}
.btn-sub{width:100%;padding:13px;background:#fff;border:1.5px solid #ddd;border-radius:14px;font-size:14px;color:#333;cursor:pointer;margin-top:8px;-webkit-appearance:none;}
.btn-sub:active{background:#f5f5f5;}
canvas{display:none;}
</style>
</head>
<body>

      </svg>

      <button class="enter-btn" onclick="enterBooth()">enter →</button>
      <div class="made-by">고집돌우럭 × AI 네컷</div>
    </div>
  </div>

  <!-- 촬영 -->
  <div class="screen" id="s-cam">
    <div class="header">
      <div class="badge">고집돌우럭 × 네컷</div>
      <div class="title">나만의 고집돌<br>네컷 만들기</div>
      <div class="sub">셔터를 누르면 3초 후 자동 촬영돼요</div>
    </div>
    <div class="progress-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div class="count-label" id="count-lbl">1 / 4 번째 사진</div>
    <div class="cam-wrap">
      <video id="preview" autoplay playsinline muted></video>
      <canvas id="snap-canvas"></canvas>
      <div class="flash" id="flash"></div>
      <div class="countdown" id="countdown"><div class="countdown-num" id="countdown-num">3</div></div>
      <div class="no-cam" id="no-cam">

      </div>
    </div>
    <div class="shutter-row">
      <div class="shutter" id="shutter-btn" onclick="startCountdown()"><div class="shutter-in"></div></div>
    </div>
  </div>

          <div class="film-slot" id="slot-0"></div>
          <div class="film-slot" id="slot-1"></div>
          <div class="film-slot" id="slot-2"></div>
          <div class="film-slot" id="slot-3"></div>
        </div>

    </div>
    <button class="btn-main" onclick="savePhoto()">📥 사진 저장하기</button>
    <button class="btn-sub" onclick="sharePhoto()">📤 SNS 공유하기</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
var photos=[],stream=null,counting=false;

function enterBooth(){
  show('s-cam');
  startCamera();
}

function startCamera(){
  var v=document.getElementById('preview'),n=document.getElementById('no-cam');
  var constraints={video:true,audio:false};
  if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia(constraints)
    .then(function(s){stream=s;v.srcObject=s;n.style.display='none';})
    .catch(function(){n.style.display='flex';});
  } else {n.style.display='flex';}
}

function stopCamera(){
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  document.getElementById('preview').srcObject=null;
}
function updateDots(){
  for(var i=0;i<4;i++){var d=document.getElementById('d'+i);if(i<photos.length)d.classList.add('on');else d.classList.remove('on');}
  document.getElementById('count-lbl').textContent=(photos.length<4?(photos.length+1)+' / 4 번째 사진':'4 / 4 완료!');
}
function startCountdown(){
  if(counting||photos.length>=4)return;
  counting=true;
  document.getElementById('shutter-btn').classList.add('disabled');
  var cd=document.getElementById('countdown'),num=document.getElementById('countdown-num');
  cd.classList.add('on');var n=3;num.textContent=n;
  var iv=setInterval(function(){n--;if(n>0){num.textContent=n;}else{clearInterval(iv);cd.classList.remove('on');takePhoto();}},1000);
}
function takePhoto(){
  var v=document.getElementById('preview'),c=document.getElementById('snap-canvas'),f=document.getElementById('flash');
  f.classList.add('on');setTimeout(function(){f.classList.remove('on');},150);
  c.width=v.videoWidth||480;c.height=v.videoHeight||640;
  var ctx=c.getContext('2d');
  ctx.drawImage(v,0,0,c.width,c.height);
  var url=c.toDataURL('image/jpeg',0.88);
  photos.push(url);
  var slot=document.getElementById('slot-'+(photos.length-1));
  var img=document.createElement('img');img.className='photo';img.src=url;slot.appendChild(img);
  updateDots();counting=false;
  document.getElementById('shutter-btn').classList.remove('disabled');
  if(photos.length===4){setTimeout(function(){stopCamera();buildResult();show('s-result');},500);}
}
function buildResult(){
  var d=new Date();
  document.getElementById('film-date').textContent=d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0')+' · JEJU';
}
function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');window.scrollTo(0,0);
}
function savePhoto(){
  var film=document.getElementById('film');
  if(typeof html2canvas!=='undefined'){
    html2canvas(film,{scale:3,backgroundColor:'#ffffff',useCORS:true,allowTaint:true}).then(function(c){
      var a=document.createElement('a');a.download='고집돌네컷.jpg';a.href=c.toDataURL('image/jpeg',0.95);a.click();
    });
  } else {alert('저장 기능 로딩 중이에요. 잠시 후 다시 눌러주세요.');}
}
function sharePhoto(){
  var txt='고집돌우럭에서 네컷 찍었어요! 🐟
#고집돌우럭 #제주맛집 #제주네컷';
  if(navigator.share){navigator.share({title:'고집돌우럭 네컷',text:txt});}
  else{navigator.clipboard&&navigator.clipboard.writeText(txt).then(function(){alert('공유 문구가 복사됐어요!');});}
}
function restart(){
  photos=[];for(var i=0;i<4;i++){document.getElementById('slot-'+i).innerHTML='';}
  updateDots();show('s-intro');
}
updateDots();
</script>
